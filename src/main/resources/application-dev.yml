spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/S{DB_NAME:attendance_db}
    username: ${DB_USER:attendance_user}
    password: 4{BB_PASS:segura123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      #ddl-auto: validate    # Obligamos a usar Flyway. Si falta una tabla, la app avisa.
      ddl-auto: update     # Crea/actualiza tablas automáticamente en dev
    show-sql: true          # muestra SQL en consola
    properties:
      hibernate:
        format_sql: true    # formatea el SQL para mejor lectura
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

loggin:
  level:
    root: DEBUG
    com.shool.attendance:system: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG    # Muestra los parámetros reales enviados a la BD
    org.hibernate.type.descriptor.sql: TRACE

