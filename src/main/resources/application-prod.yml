spring:
  datasource:
    #url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:attendance_db}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate      # en produccion nunca usar update
    show-sql: false           # no mostrar SQL en logs
    properties:
      hibernate:
        format_sql: false     # desactiva formato para performance
        dialect: org.hibernate.dialect.PostgresSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    root: INFO
    com.school.attendance_system: INFO
    org.springframework: WARN
    org.hibernate.SQL: WARN
  file:
    name: logs/attendance-system.log

