spring:
  datasource:
    url: jdbc:postgressql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:attendance_db}
    username: ${DB_USER:attendance_user}
    password: ${DB_PASS:segura123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate      # en produccion nunca usar update
    properties:
      hibernate:
        format_sql: false     # desactiva formato para performance
    show-sql: false           # no mostrar SQL en logs
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARM
    org.springframework: INFO
